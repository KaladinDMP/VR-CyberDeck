<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512" width="512" height="512">
  <!-- Dark background rounded square -->
  <rect width="512" height="512" rx="80" fill="#020210"/>

  <!-- Outer ring segments (broken arc, like header) -->
  <!-- Top-right arc (bright green) -->
  <path d="M 256,20 A 236,236 0 0 1 492,256" fill="none" stroke="#39ff14" stroke-width="14"/>
  <!-- Bottom-right arc (dim green) -->
  <path d="M 492,256 A 236,236 0 0 1 374,456" fill="none" stroke="rgba(57,255,20,0.5)" stroke-width="9"/>
  <!-- Bottom-left arc (dim green) -->
  <path d="M 138,456 A 236,236 0 0 1 20,256" fill="none" stroke="rgba(57,255,20,0.5)" stroke-width="9"/>
  <!-- Top-left arc (purple) -->
  <path d="M 20,256 A 236,236 0 0 1 256,20" fill="none" stroke="#a855f7" stroke-width="14"/>

  <!-- Small tick marks at gaps -->
  <line x1="358" y1="468" x2="384" y2="452" stroke="rgba(57,255,20,0.6)" stroke-width="7"/>
  <line x1="128" y1="452" x2="154" y2="468" stroke="rgba(168,85,247,0.6)" stroke-width="7"/>

  <!-- Inner thin ring -->
  <circle cx="256" cy="256" r="205" fill="none" stroke="rgba(57,255,20,0.08)" stroke-width="3"/>

  <!-- "V" — bold purple, offset left -->
  <text x="60" y="370" fill="#a855f7" font-family="'Courier New',monospace" font-size="310" font-weight="900" dominant-baseline="auto">V</text>
  <!-- Scan lines over V (glitch effect) -->
  <rect x="40" y="145" width="230" height="14" fill="rgba(2,2,16,0.72)"/>
  <rect x="40" y="180" width="230" height="10" fill="rgba(2,2,16,0.55)"/>
  <rect x="40" y="222" width="230" height="14" fill="rgba(2,2,16,0.65)"/>
  <rect x="40" y="265" width="230" height="10" fill="rgba(2,2,16,0.5)"/>
  <rect x="40" y="305" width="230" height="14" fill="rgba(2,2,16,0.6)"/>

  <!-- "R" — bold neon green, offset right, overlapping V -->
  <text x="195" y="370" fill="#39ff14" font-family="'Courier New',monospace" font-size="310" font-weight="900" dominant-baseline="auto">R</text>
  <!-- Scan lines over R -->
  <rect x="190" y="145" width="290" height="14" fill="rgba(2,2,16,0.6)"/>
  <rect x="190" y="188" width="290" height="10" fill="rgba(2,2,16,0.45)"/>
  <rect x="190" y="234" width="290" height="14" fill="rgba(2,2,16,0.55)"/>
  <rect x="190" y="278" width="290" height="10" fill="rgba(2,2,16,0.5)"/>

  <!-- Glitch ghost: purple offset "VR" -->
  <text x="68" y="366" fill="rgba(168,85,247,0.18)" font-family="'Courier New',monospace" font-size="310" font-weight="900" dominant-baseline="auto">VR</text>

  <!-- Bottom accent line -->
  <line x1="80" y1="400" x2="432" y2="400" stroke="rgba(168,85,247,0.35)" stroke-width="4"/>

  <!-- Corner accent dots -->
  <circle cx="430" cy="82" r="9" fill="rgba(57,255,20,0.6)"/>
  <circle cx="82" cy="82" r="7" fill="rgba(168,85,247,0.55)"/>
</svg>
