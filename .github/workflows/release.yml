name: Create Release

on:
  workflow_dispatch:
    inputs:
      version:
        description: 'Release version (e.g. 1.0.1) — used as tag (v$VERSION), title, and app version.'
        required: true
        type: string
  push:
    tags:
      - 'v*.*.*'

# Workflow-level write permission so every job inherits it.
permissions:
  contents: write

jobs:
  bump-version:
    name: Commit version bump to package.json
    runs-on: ubuntu-latest
    outputs:
      version: ${{ steps.resolve.outputs.version }}
      sha: ${{ steps.push.outputs.sha }}
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          fetch-depth: 0

      - name: Resolve version
        id: resolve
        shell: bash
        env:
          INPUT_VERSION: ${{ github.event.inputs.version }}
          REF_NAME: ${{ github.ref_name }}
        run: |
          set -euxo pipefail
          if [ -n "${INPUT_VERSION:-}" ]; then
            VERSION="${INPUT_VERSION#v}"
          elif [[ "${REF_NAME:-}" == v*.*.* ]]; then
            VERSION="${REF_NAME#v}"
          else
            VERSION="$(node -p "require('./package.json').version")"
          fi
          if [ -z "$VERSION" ]; then
            echo "::error::Could not resolve a version from inputs/ref/package.json"
            exit 1
          fi
          echo "Resolved version: $VERSION"
          echo "version=$VERSION" >> "$GITHUB_OUTPUT"

      - name: Write version into package.json and push if changed
        id: push
        shell: bash
        env:
          VERSION: ${{ steps.resolve.outputs.version }}
        run: |
          set -euxo pipefail

          # Update package.json to the requested version.
          node -e "const fs=require('fs');const p=require('./package.json');p.version=process.env.VERSION;fs.writeFileSync('./package.json',JSON.stringify(p,null,2)+'\n');"
          echo "package.json is now at: $(node -p "require('./package.json').version")"

          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

          if git diff --quiet -- package.json; then
            echo "No version change — package.json already at $VERSION."
            SHA="$(git rev-parse HEAD)"
          else
            git add package.json
            git commit -m "chore: bump version to $VERSION [skip ci]"
            DEFAULT_BRANCH="$(git remote show origin | sed -n '/HEAD branch/s/.*: //p')"
            echo "Pushing version bump to origin/$DEFAULT_BRANCH"
            git push origin "HEAD:$DEFAULT_BRANCH"
            SHA="$(git rev-parse HEAD)"
          fi

          echo "Bump-version SHA: $SHA"
          echo "sha=$SHA" >> "$GITHUB_OUTPUT"

  build:
    name: Build on ${{ matrix.os }}
    needs: bump-version
    runs-on: ${{ matrix.os }}
    continue-on-error: true
    strategy:
      fail-fast: false
      matrix:
        os: [macos-latest, ubuntu-latest, windows-latest]

    outputs:
      package_version: ${{ steps.build_details.outputs.package_version }}

    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          ref: ${{ needs.bump-version.outputs.sha }}

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20.x'
          cache: 'npm'

      - name: Cache Electron binaries
        uses: actions/cache@v4
        with:
          path: |
            ~/.cache/electron
            ~/.cache/electron-builder
            ~/Library/Caches/electron
            ~/Library/Caches/electron-builder
            ~/AppData/Local/electron/Cache
            ~/AppData/Local/electron-builder/cache
            ~/.dmg-builder
          key: ${{ runner.os }}-electron-${{ hashFiles('**/package.json', '**/package-lock.json') }}
          restore-keys: |
            ${{ runner.os }}-electron-

      - name: Install dependencies
        run: npm install --legacy-peer-deps

      - name: Determine build command and artifact path
        id: build_details
        shell: bash
        env:
          VERSION: ${{ needs.bump-version.outputs.version }}
        run: |
          set -euxo pipefail
          PRODUCT_NAME="$(node -p "require('./package.json').name")"

          echo "Using version: $VERSION"
          echo "package_version=${VERSION}" >> "$GITHUB_OUTPUT"

          OUTPUT_DIR="dist"

          if [ "$RUNNER_OS" == "Windows" ]; then
            echo "BUILD_COMMAND=npx electron-vite build && npx electron-builder --win --x64 --ia32 --publish never" >> "$GITHUB_OUTPUT"
            echo "ARTIFACT_PATH=${OUTPUT_DIR}/${PRODUCT_NAME}-${VERSION}-*.exe" >> "$GITHUB_OUTPUT"
          elif [ "$RUNNER_OS" == "macOS" ]; then
            echo "BUILD_COMMAND=npx electron-vite build && npx electron-builder --mac --x64 --arm64 --publish never" >> "$GITHUB_OUTPUT"
            echo "ARTIFACT_PATH=${OUTPUT_DIR}/${PRODUCT_NAME}-${VERSION}-*.dmg" >> "$GITHUB_OUTPUT"
          elif [ "$RUNNER_OS" == "Linux" ]; then
            echo "BUILD_COMMAND=npx electron-vite build && npx electron-builder --linux --x64 --arm64 --publish never" >> "$GITHUB_OUTPUT"
            echo "ARTIFACT_PATH=${OUTPUT_DIR}/${PRODUCT_NAME}-${VERSION}-*.[Ad]*" >> "$GITHUB_OUTPUT"
          fi

      - name: Pre-cache arm64 dmg-builder tool (required on ARM64 runner to build any DMG)
        if: runner.os == 'macOS'
        shell: bash
        run: |
          set -euxo pipefail
          CACHE_DIR="$HOME/Library/Caches/electron-builder/dmg-builder/1.2.0"
          FILE="$CACHE_DIR/dmgbuild-bundle-arm64-75c8a6c.tar.gz"
          mkdir -p "$CACHE_DIR"
          if [ ! -f "$FILE" ]; then
            curl -fL --retry 5 --retry-delay 5 -o "$FILE" \
              "https://github.com/electron-userland/electron-builder-binaries/releases/download/dmg-builder%401.2.0/dmgbuild-bundle-arm64-75c8a6c.tar.gz"
          fi
          ls -lh "$FILE"

      - name: Build application
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          ELECTRON_BUILDER_DOWNLOAD_TIMEOUT: 120000
          npm_config_fetch_timeout: 120000
          npm_config_fetch_retry_mintimeout: 20000
          npm_config_fetch_retry_maxtimeout: 120000
          npm_config_fetch_retries: 5
        timeout-minutes: 30
        shell: bash
        run: |
          set -euxo pipefail
          for i in 1 2 3; do
            ${{ steps.build_details.outputs.BUILD_COMMAND }} && break
            echo "Build attempt $i failed, retrying in 30s..."
            sleep 30
          done

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: build-artifact-${{ matrix.os }}
          path: ${{ steps.build_details.outputs.ARTIFACT_PATH }}
          if-no-files-found: warn

  create_release:
    name: Create GitHub Release
    needs: [bump-version, build]
    # Run even if some OS builds failed, so the successful ones can still publish.
    if: always()
    runs-on: ubuntu-latest
    outputs:
      version: ${{ needs.bump-version.outputs.version }}
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Sanity-check inputs from previous jobs
        shell: bash
        env:
          VERSION: ${{ needs.bump-version.outputs.version }}
          TARGET_SHA: ${{ needs.bump-version.outputs.sha }}
        run: |
          set -euxo pipefail
          echo "VERSION='${VERSION}'"
          echo "TARGET_SHA='${TARGET_SHA}'"
          if [ -z "${VERSION}" ]; then
            echo "::error::bump-version did not produce a version output. Aborting."
            exit 1
          fi
          if [ -z "${TARGET_SHA}" ]; then
            echo "::error::bump-version did not produce a sha output. Aborting."
            exit 1
          fi

      - name: Download all build artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts

      - name: List downloaded artifacts
        shell: bash
        run: |
          echo "Contents of artifacts directory:"
          ls -laR artifacts || true

      - name: Create draft release and upload assets
        shell: bash
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          VERSION: ${{ needs.bump-version.outputs.version }}
          TARGET_SHA: ${{ needs.bump-version.outputs.sha }}
          REPO: ${{ github.repository }}
        run: |
          set -euxo pipefail

          TAG="v${VERSION}"
          echo "Creating draft release $TAG in $REPO at commit $TARGET_SHA"

          # Best-effort cleanup of any stale release / tag from a previous failed run.
          # Failure here must NOT abort the job, so wrap each call in `|| true`.
          if gh release view "$TAG" --repo "$REPO" >/dev/null 2>&1; then
            echo "Found existing release $TAG, deleting before recreate..."
            gh release delete "$TAG" --repo "$REPO" --yes || true
          fi
          # Tag may exist independently of the release; delete if present.
          gh api -X DELETE "repos/$REPO/git/refs/tags/$TAG" >/dev/null 2>&1 || true

          # Create the draft release. Skip --generate-notes here because it can
          # fail if the previous tag is unreachable; we'll generate notes after.
          gh release create "$TAG" \
            --repo "$REPO" \
            --title "Release $TAG" \
            --draft \
            --target "$TARGET_SHA" \
            --notes "Draft release for $TAG."
          echo "Created draft release $TAG."

          # Try to upgrade the body to auto-generated notes. Don't fail the job
          # if note generation fails for any reason.
          set +e
          NOTES="$(gh api -X POST "repos/$REPO/releases/generate-notes" \
            -f tag_name="$TAG" \
            -f target_commitish="$TARGET_SHA" \
            --jq .body 2>/dev/null)"
          if [ -n "$NOTES" ]; then
            gh release edit "$TAG" --repo "$REPO" --notes "$NOTES" || true
          fi
          set -e

          # Upload artifacts. Each missing/empty dir is logged but not fatal.
          for DIR in \
            artifacts/build-artifact-windows-latest \
            artifacts/build-artifact-macos-latest \
            artifacts/build-artifact-ubuntu-latest; do
            if [ -d "$DIR" ]; then
              FILES=$(find "$DIR" -maxdepth 1 -type f)
              if [ -n "$FILES" ]; then
                echo "Uploading from $DIR..."
                # shellcheck disable=SC2086
                gh release upload "$TAG" $FILES --repo "$REPO" --clobber
              else
                echo "No files in $DIR (build may have failed for that OS), skipping."
              fi
            else
              echo "$DIR not found, skipping."
            fi
          done

          URL="$(gh release view "$TAG" --repo "$REPO" --json url -q .url)"
          echo "Done. Release URL: $URL"

  mac:
    name: Build macOS DMG
    needs: create_release
    if: always()
    uses: ./.github/workflows/mac-build.yml
    with:
      version: ${{ needs.create_release.outputs.version }}
    permissions:
      contents: write
