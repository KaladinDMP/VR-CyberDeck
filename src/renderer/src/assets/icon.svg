<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100">
  <!-- Dark background circle -->
  <circle cx="50" cy="50" r="50" fill="#020210"/>

  <!-- Outer ring segments (not complete — leaves gaps like reference) -->
  <!-- Top-right arc -->
  <path d="M 50,4 A 46,46 0 0 1 96,50" fill="none" stroke="#39ff14" stroke-width="2.8"/>
  <!-- Bottom-right arc -->
  <path d="M 96,50 A 46,46 0 0 1 73,89" fill="none" stroke="rgba(57,255,20,0.5)" stroke-width="1.8"/>
  <!-- Bottom-left arc -->
  <path d="M 27,89 A 46,46 0 0 1 4,50" fill="none" stroke="rgba(57,255,20,0.5)" stroke-width="1.8"/>
  <!-- Top-left arc (purple) -->
  <path d="M 4,50 A 46,46 0 0 1 50,4" fill="none" stroke="#a855f7" stroke-width="2.8"/>

  <!-- Small tick marks at gaps -->
  <line x1="69" y1="91" x2="75" y2="87" stroke="rgba(57,255,20,0.6)" stroke-width="1.5"/>
  <line x1="25" y1="87" x2="31" y2="91" stroke="rgba(168,85,247,0.6)" stroke-width="1.5"/>

  <!-- Inner thin ring -->
  <circle cx="50" cy="50" r="40" fill="none" stroke="rgba(57,255,20,0.08)" stroke-width="0.6"/>

  <!-- "V" — bold purple, offset left, with scan line cuts -->
  <text x="31" y="65" fill="#a855f7" font-family="'Courier New',monospace" font-size="46" font-weight="900" dominant-baseline="auto">V</text>
  <!-- Scan lines over V (glitch effect) -->
  <rect x="12" y="36" width="38" height="2.5" fill="rgba(2,2,16,0.72)"/>
  <rect x="12" y="42" width="38" height="1.8" fill="rgba(2,2,16,0.55)"/>
  <rect x="12" y="50" width="38" height="2.5" fill="rgba(2,2,16,0.65)"/>
  <rect x="12" y="58" width="38" height="1.8" fill="rgba(2,2,16,0.5)"/>

  <!-- "R" — bold neon green, offset right, overlapping V -->
  <text x="46" y="65" fill="#39ff14" font-family="'Courier New',monospace" font-size="46" font-weight="900" dominant-baseline="auto">R</text>
  <!-- Scan lines over R -->
  <rect x="44" y="36" width="40" height="2.5" fill="rgba(2,2,16,0.6)"/>
  <rect x="44" y="44" width="40" height="1.8" fill="rgba(2,2,16,0.45)"/>
  <rect x="44" y="52" width="40" height="2.5" fill="rgba(2,2,16,0.55)"/>

  <!-- Glitch offset: purple ghost of "VR" shifted right -->
  <text x="33" y="64" fill="rgba(168,85,247,0.2)" font-family="'Courier New',monospace" font-size="46" font-weight="900" dominant-baseline="auto">VR</text>

  <!-- Bottom accent line -->
  <line x1="20" y1="72" x2="80" y2="72" stroke="rgba(168,85,247,0.35)" stroke-width="0.8"/>

  <!-- Corner accent dots -->
  <circle cx="84" cy="16" r="1.8" fill="rgba(57,255,20,0.6)"/>
  <circle cx="16" cy="16" r="1.5" fill="rgba(168,85,247,0.55)"/>
</svg>
