<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100">
  <!-- Dark background -->
  <circle cx="50" cy="50" r="50" fill="#020210"/>
  <!-- Outer green ring -->
  <circle cx="50" cy="50" r="47" fill="none" stroke="#39ff14" stroke-width="2.5"/>
  <!-- Inner faint ring -->
  <circle cx="50" cy="50" r="43" fill="none" stroke="rgba(57,255,20,0.2)" stroke-width="0.75"/>
  <!-- Subtle grid cross-hairs -->
  <line x1="10" y1="50" x2="90" y2="50" stroke="rgba(57,255,20,0.07)" stroke-width="0.5"/>
  <line x1="50" y1="10" x2="50" y2="90" stroke="rgba(57,255,20,0.07)" stroke-width="0.5"/>
  <!-- Cardinal tick marks -->
  <line x1="50" y1="4" x2="50" y2="11" stroke="#39ff14" stroke-width="2.5"/>
  <line x1="50" y1="89" x2="50" y2="96" stroke="#39ff14" stroke-width="2.5"/>
  <line x1="4" y1="50" x2="11" y2="50" stroke="#39ff14" stroke-width="2.5"/>
  <line x1="89" y1="50" x2="96" y2="50" stroke="#39ff14" stroke-width="2.5"/>
  <!-- Diagonal accent dots -->
  <circle cx="83" cy="17" r="1.8" fill="rgba(168,85,247,0.8)"/>
  <circle cx="17" cy="83" r="1.8" fill="rgba(168,85,247,0.8)"/>
  <circle cx="17" cy="17" r="1.5" fill="rgba(57,255,20,0.4)"/>
  <circle cx="83" cy="83" r="1.5" fill="rgba(57,255,20,0.4)"/>
  <!-- VR main text -->
  <text x="50" y="62" text-anchor="middle" fill="#39ff14"
        font-family="Courier New,monospace" font-size="36" font-weight="900">VR</text>
  <!-- Purple divider bar -->
  <rect x="22" y="66" width="56" height="1.5" fill="#a855f7" rx="0.75"/>
  <!-- DECK subtext -->
  <text x="50" y="79" text-anchor="middle" fill="rgba(168,85,247,0.9)"
        font-family="Courier New,monospace" font-size="9">DECK</text>
</svg>
